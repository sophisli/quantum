<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Info AI Assistant</title>
    
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          processEscapes: true
        }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        /* 干净美观的学术工作台背景 */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .welcome-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        h1 { color: #1a73e8; font-size: 2.2rem; margin-bottom: 10px; }
        p { color: #5f6368; font-size: 1.05rem; line-height: 1.6; }

        /* ========================================== -->
        */
        :root {
            --df-messenger-bot-message: #ffffff;
            --df-messenger-button-titlebar-color: #1a73e8;
            --df-messenger-chat-background-color: #f3f6fc;
            --df-messenger-font-color: #000000;
            --df-messenger-user-message: #d3e3fd;
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <h1>Li-Bot 理论物理学术工作台</h1>
        <p>339 篇 MIPT 与开放系统文献仓已准备就绪</p>
    </div>

    <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v0/df-messenger.js"></script>
    <df-messenger
      chat-title="quantum chat"
      agent-id="e377bd57-dc6a-4d0c-b6a5-bf9f9cd81a44"
      language-code="zh-cn">
    </df-messenger>
    <script>
      const observer = new MutationObserver(() => {
        if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') {
          window.MathJax.typesetPromise();
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });
    </script>
</body>
</html>
